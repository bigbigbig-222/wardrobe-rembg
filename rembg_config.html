<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REMBG API配置</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .config-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #1f6f5f;
            box-shadow: 0 0 0 2px rgba(31,111,95,0.1);
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-save {
            background: #1f6f5f;
            color: white;
        }
        .btn-save:hover {
            background: #185043;
        }
        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }
        .btn-reset:hover {
            background: #e0e0e0;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status.error {
            background: #ffebee;
            color: #c62828;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #1976d2;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            color: #1976d2;
        }
        .example {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="config-panel">
        <h2>🚀 REMBG API配置面板</h2>
        
        <div class="info-box">
            💡 在这里配置AI抠图后端API地址。配置会保存到浏览器本地存储。
        </div>

        <form id="configForm">
            <div class="form-group">
                <label for="apiUrl">REMBG API地址</label>
                <input 
                    type="url" 
                    id="apiUrl" 
                    placeholder="https://your-railway-domain.up.railway.app/remove_background"
                    required
                >
                <div class="example">
                    示例：https://wardrobe-api-production.up.railway.app/remove_background
                </div>
            </div>

            <div class="form-group">
                <label for="status">当前状态</label>
                <input type="text" id="status" readonly style="background: #f9f9f9; color: #666;">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-save">💾 保存配置</button>
                <button type="button" class="btn-reset" onclick="resetConfig()">🔄 重置为默认</button>
            </div>

            <div id="message"></div>
        </form>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999;">
            <p><strong>ℹ️ 说明：</strong></p>
            <ul>
                <li>本地开发：http://127.0.0.1:5000/remove_background</li>
                <li>Railway部署：https://[your-domain]-production.up.railway.app/remove_background</li>
                <li>配置会自动保存到浏览器本地存储</li>
                <li>重新加载页面配置会保持</li>
            </ul>
        </div>
    </div>

    <script>
        // 页面加载时显示当前配置
        window.addEventListener('load', () => {
            const currentUrl = localStorage.getItem('removeBgApiUrl');
            const statusElement = document.getElementById('status');
            
            if (currentUrl) {
                document.getElementById('apiUrl').value = currentUrl;
                statusElement.value = '✓ 已配置 (' + currentUrl + ')';
                statusElement.style.background = '#e8f5e9';
            } else {
                statusElement.value = '⚪ 使用默认配置';
                statusElement.style.background = '#f9f9f9';
            }
        });

        // 表单提交
        document.getElementById('configForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const messageElement = document.getElementById('message');
            
            try {
                new URL(apiUrl); // 验证URL格式
                
                localStorage.setItem('removeBgApiUrl', apiUrl);
                
                messageElement.innerHTML = '<div class="status success">✓ 配置已保存！API地址：' + apiUrl + '</div>';
                document.getElementById('status').value = '✓ 已配置 (' + apiUrl + ')';
                document.getElementById('status').style.background = '#e8f5e9';
                
                setTimeout(() => {
                    messageElement.innerHTML = '';
                }, 5000);
            } catch (error) {
                messageElement.innerHTML = '<div class="status error">✗ URL格式错误，请检查</div>';
                document.getElementById('status').value = '✗ 配置错误';
                document.getElementById('status').style.background = '#ffebee';
            }
        });

        // 重置配置
        function resetConfig() {
            localStorage.removeItem('removeBgApiUrl');
            document.getElementById('apiUrl').value = '';
            document.getElementById('status').value = '⚪ 使用默认配置';
            document.getElementById('status').style.background = '#f9f9f9';
            document.getElementById('message').innerHTML = '<div class="status success">✓ 已重置为默认配置</div>';
            
            setTimeout(() => {
                document.getElementById('message').innerHTML = '';
            }, 3000);
        }
    </script>
</body>
</html>
