<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品牌Logo离线下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }
        
        .progress-section {
            display: none;
            margin-bottom: 30px;
        }
        
        .progress-section.active {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .brand-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .brand-item {
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            background: #fafafa;
            transition: all 0.3s;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .brand-item.success {
            background: #e8f5e9;
            border-color: #4caf50;
            color: #2e7d32;
        }
        
        .brand-item.error {
            background: #ffebee;
            border-color: #f44336;
            color: #c62828;
        }
        
        .brand-item.loading {
            background: #e3f2fd;
            border-color: #2196f3;
            color: #1565c0;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        .brand-item img {
            max-width: 80px;
            max-height: 60px;
            margin-bottom: 8px;
            object-fit: contain;
        }
        
        .output-section {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .output-section.active {
            display: block;
        }
        
        .output-section h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .output-code {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .copy-btn {
            background: #4caf50;
            color: white;
            margin-top: 15px;
            padding: 10px 20px;
        }
        
        .copy-btn:hover {
            background: #45a049;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .stat-card strong {
            display: block;
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .stat-card span {
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 品牌Logo离线下载器</h1>
            <p>自动下载真实品牌Logo并转换为Base64 Data URIs，实现完全离线可用</p>
        </div>
        
        <div class="content">
            <div class="controls">
                <button class="btn-primary" id="startBtn" onclick="startDownload()">开始下载</button>
                <button class="btn-primary" id="stopBtn" onclick="stopDownload()" disabled>停止</button>
                <button class="btn-secondary" id="resetBtn" onclick="resetAll()">重置</button>
            </div>
            
            <div class="progress-section" id="progressSection">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div class="status-text" id="statusText">准备开始...</div>
            </div>
            
            <div class="stats" id="statsDiv" style="display: none;">
                <div class="stat-card">
                    <strong id="successCount">0</strong>
                    <span>成功下载</span>
                </div>
                <div class="stat-card">
                    <strong id="failCount">0</strong>
                    <span>下载失败</span>
                </div>
                <div class="stat-card">
                    <strong id="totalSize">0 MB</strong>
                    <span>总文件大小</span>
                </div>
            </div>
            
            <div class="brand-grid" id="brandGrid"></div>
            
            <div class="output-section" id="outputSection">
                <h3>✅ 生成的JavaScript代码</h3>
                <div class="output-code" id="outputCode"></div>
                <button class="btn-primary copy-btn" onclick="copyCode()">📋 复制到剪贴板</button>
                <button class="btn-secondary copy-btn" onclick="downloadCode()">⬇️ 下载为文件</button>
            </div>
        </div>
    </div>

    <script>
        const BRANDS = [
            // 零售和时尚
            "uniqlo", "muji", "zara", "h&m", "gap", "levi's",
            // 运动品牌
            "nike", "adidas", "puma", "new balance", "converse", "vans",
            "skechers", "anta", "li-ning", "fila",
            // 户外
            "the north face", "columbia", "lululemon", "massimo dutti",
            "mont-bell", "arc'teryx", "keen", "nanamica", "patagonia",
            "mammut", "salomon", "merrell", "hoka", "on",
            "black diamond", "snow peak", "deuter", "osprey", "jack wolfskin"
        ];

        // Logo源配置 - 按优先级排序
        const LOGO_URLS = {
            uniqlo: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Uniqlo_logo.svg/1200px-Uniqlo_logo.svg.png",
                "https://upload.wikimedia.org/wikipedia/commons/2/2f/Uniqlo_logo.svg"
            ],
            muji: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Muji_logo.svg/1200px-Muji_logo.svg.png"
            ],
            zara: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Zara_logo.svg/1200px-Zara_logo.svg.png"
            ],
            "h&m": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/5/53/H%26M-Logo.svg/1200px-H%26M-Logo.svg.png"
            ],
            gap: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Gap_logo.svg/1200px-Gap_logo.svg.png"
            ],
            "levi's": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Levi_Strauss_%26_Co._logo.svg/1200px-Levi_Strauss_%26_Co._logo.svg.png"
            ],
            nike: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Nike_logo.svg/1200px-Nike_logo.svg.png"
            ],
            adidas: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Adidas_logo.svg/1200px-Adidas_logo.svg.png"
            ],
            puma: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Puma_logo.svg/1200px-Puma_logo.svg.png"
            ],
            "new balance": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/New_Balance_logo.svg/1200px-New_Balance_logo.svg.png"
            ],
            converse: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Converse_logo.svg/1200px-Converse_logo.svg.png"
            ],
            vans: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Vans_logo.svg/1200px-Vans_logo.svg.png"
            ],
            skechers: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Skechers_logo.svg/1200px-Skechers_logo.svg.png"
            ],
            anta: [
                "https://upload.wikimedia.org/wikipedia/commons/3/3f/Anta_Sports_logo.png"
            ],
            "li-ning": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Li-Ning_logo.svg/1200px-Li-Ning_logo.svg.png"
            ],
            fila: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Fila_logo.svg/1200px-Fila_logo.svg.png"
            ],
            "the north face": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/The_North_Face_logo.svg/1200px-The_North_Face_logo.svg.png"
            ],
            columbia: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Columbia_Sportswear_logo.svg/1200px-Columbia_Sportswear_logo.svg.png"
            ],
            lululemon: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Lululemon_athletica_logo.svg/1200px-Lululemon_athletica_logo.svg.png"
            ],
            "massimo dutti": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/9/94/Massimo_Dutti_logo.svg/1200px-Massimo_Dutti_logo.svg.png"
            ],
            "mont-bell": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Montbell_logo.svg/1200px-Montbell_logo.svg.png"
            ],
            "arc'teryx": [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Arc%27teryx_logo.svg/1200px-Arc%27teryx_logo.svg.png"
            ],
            keen: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Keen_footwear_logo.svg/1200px-Keen_footwear_logo.svg.png"
            ],
            nanamica: [
                "https://upload.wikimedia.org/wikipedia/commons/8/8a/Nanamica_Logo.jpg"
            ],
            patagonia: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Patagonia_logo.svg/1200px-Patagonia_logo.svg.png"
            ],
            mammut: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/9/96/Mammut_logo.svg/1200px-Mammut_logo.svg.png"
            ],
            salomon: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/4/48/Salomon_logo.svg/1200px-Salomon_logo.svg.png"
            ],
            merrell: [
                "https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Merrell_logo.svg/1200px-Merrell_logo.svg.png"
            ],
            hoka: [
                "https://upload.wikimedia.org/wikipedia/commons/c/c9/HOKA_logo.png"
            ],
            on: [
                "https://upload.wikimedia.org/wikipedia/commons/1/1e/ON_logo.png"
            ],
            "black diamond": [
                "https://upload.wikimedia.org/wikipedia/commons/f/f7/Black_Diamond_logo.png"
            ],
            "snow peak": [
                "https://upload.wikimedia.org/wikipedia/commons/1/10/Snow_Peak_logo.jpg"
            ],
            deuter: [
                "https://upload.wikimedia.org/wikipedia/commons/1/12/Deuter_logo.svg"
            ],
            osprey: [
                "https://upload.wikimedia.org/wikipedia/commons/3/37/Osprey_Packs_logo.jpg"
            ],
            "jack wolfskin": [
                "https://upload.wikimedia.org/wikipedia/commons/e/eb/Jack_Wolfskin_logo.png"
            ]
        };

        let isRunning = false;
        const logos = {};
        let successCount = 0;
        let failCount = 0;

        function initBrandGrid() {
            const grid = document.getElementById('brandGrid');
            grid.innerHTML = '';
            BRANDS.forEach(brand => {
                const item = document.createElement('div');
                item.className = 'brand-item';
                item.id = `brand-${brand}`;
                item.innerHTML = `<div style="font-size: 12px;">⏳</div><div>${brand}</div>`;
                grid.appendChild(item);
            });
        }

        async function downloadLogo(brand) {
            const urls = LOGO_URLS[brand] || [];
            const item = document.getElementById(`brand-${brand}`);

            for (const url of urls) {
                try {
                    const response = await fetch(url, {
                        headers: { 'User-Agent': 'Mozilla/5.0' }
                    });
                    
                    if (!response.ok) continue;

                    const blob = await response.blob();
                    
                    // 如果是SVG，直接转Base64
                    if (blob.type.includes('svg') || url.includes('.svg')) {
                        const reader = new FileReader();
                        return new Promise((resolve) => {
                            reader.onloadend = () => {
                                const base64 = reader.result;
                                item.className = 'brand-item success';
                                item.innerHTML = `<div style="font-size: 18px;">✓</div><div>${brand}</div>`;
                                logos[brand] = base64;
                                successCount++;
                                resolve(true);
                            };
                            reader.readAsDataURL(blob);
                        });
                    } else {
                        // 处理图片：转PNG并压缩
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 256;
                            canvas.height = 256;
                            const ctx = canvas.getContext('2d');
                            
                            // 计算缩放比例保持宽高比
                            let scale = Math.min(256 / img.width, 256 / img.height);
                            let x = (256 - img.width * scale) / 2;
                            let y = (256 - img.height * scale) / 2;
                            
                            ctx.fillStyle = 'white';
                            ctx.fillRect(0, 0, 256, 256);
                            ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                            
                            const dataUrl = canvas.toDataURL('image/png', 0.85);
                            item.className = 'brand-item success';
                            item.innerHTML = `<img src="${dataUrl}"><div>${brand}</div>`;
                            logos[brand] = dataUrl;
                            successCount++;
                            return true;
                        };
                        img.onerror = () => {
                            throw new Error('Image load failed');
                        };
                        img.src = URL.createObjectURL(blob);
                        
                        // 等待图片加载
                        return new Promise((resolve) => {
                            img.onload = () => resolve(true);
                            img.onerror = () => resolve(false);
                        });
                    }
                } catch (e) {
                    continue;
                }
            }

            item.className = 'brand-item error';
            item.innerHTML = `<div style="font-size: 18px;">✗</div><div>${brand}</div>`;
            failCount++;
            return false;
        }

        async function startDownload() {
            isRunning = true;
            successCount = 0;
            failCount = 0;
            logos = {};

            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('progressSection').classList.add('active');
            document.getElementById('statsDiv').style.display = 'grid';
            document.getElementById('outputSection').classList.remove('active');

            initBrandGrid();

            for (let i = 0; i < BRANDS.length && isRunning; i++) {
                const brand = BRANDS[i];
                const progress = ((i + 1) / BRANDS.length) * 100;
                
                document.getElementById('progressFill').style.width = progress + '%';
                document.getElementById('progressFill').textContent = Math.round(progress) + '%';
                document.getElementById('statusText').textContent = `处理中... ${i + 1}/${BRANDS.length}: ${brand}`;

                await downloadLogo(brand);

                // 更新统计
                document.getElementById('successCount').textContent = successCount;
                document.getElementById('failCount').textContent = failCount;
                
                // 计算大小
                const totalSize = Object.values(logos).reduce((sum, logo) => sum + logo.length, 0);
                document.getElementById('totalSize').textContent = (totalSize / (1024 * 1024)).toFixed(2) + ' MB';

                await new Promise(resolve => setTimeout(resolve, 200)); // 限流
            }

            if (isRunning) {
                generateCode();
                document.getElementById('outputSection').classList.add('active');
                document.getElementById('statusText').textContent = `✅ 完成！成功下载 ${successCount} 个Logo`;
            }

            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        function stopDownload() {
            isRunning = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('statusText').textContent = '已停止';
        }

        function resetAll() {
            logos = {};
            successCount = 0;
            failCount = 0;
            isRunning = false;
            
            document.getElementById('progressSection').classList.remove('active');
            document.getElementById('statsDiv').style.display = 'none';
            document.getElementById('outputSection').classList.remove('active');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('brandGrid').innerHTML = '';
        }

        function generateCode() {
            let code = `// 离线品牌Logo - 自动生成
// 生成时间: ${new Date().toLocaleString()}
// 成功数: ${successCount}/${BRANDS.length}

const BRAND_LOGO_SOURCES = {
`;

            for (const brand of BRANDS) {
                if (logos[brand]) {
                    code += `  '${brand}': '${logos[brand]}',\n`;
                }
            }

            code += `}

// 创建Logo映射
const PRESET_BRAND_LOGOS_CDN = {}

function buildPresetBrandLogosMapping() {
  for (const [brandName, logoUrl] of Object.entries(BRAND_LOGO_SOURCES)) {
    const normalized = String(brandName || "").trim().toLowerCase();
    PRESET_BRAND_LOGOS_CDN[normalized] = logoUrl;
  }
}

// 初始化
buildPresetBrandLogosMapping();
`;

            document.getElementById('outputCode').textContent = code;
        }

        function copyCode() {
            const code = document.getElementById('outputCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ 已复制到剪贴板！');
            });
        }

        function downloadCode() {
            const code = document.getElementById('outputCode').textContent;
            const blob = new Blob([code], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'brand_logos_offline.js';
            a.click();
            URL.revokeObjectURL(url);
        }

        // 初始化
        window.addEventListener('load', () => {
            initBrandGrid();
        });
    </script>
</body>
</html>
